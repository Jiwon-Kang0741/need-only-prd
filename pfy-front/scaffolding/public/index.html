<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pfy-front · MockUp 스캐폴딩</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .tab-active { @apply border-b-2 border-indigo-600 text-indigo-600 font-semibold; }
    pre { font-family: 'Consolas', 'Menlo', monospace; }
    .field-card:hover .field-delete { opacity: 1; }
    .field-delete { opacity: 0; transition: opacity .15s; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- ─────────────────── Header ─────────────────────────────────────── -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-3">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">S</div>
    <h1 class="text-lg font-bold text-slate-900">MockUp 스캐폴딩</h1>
    <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">pfy-front</span>
    <div class="ml-auto flex items-center gap-2 text-xs text-slate-400" id="healthStatus">
      <span class="w-2 h-2 rounded-full bg-slate-300"></span> 연결 확인 중…
    </div>
  </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-12 gap-6">

  <!-- ── Left Panel: Form ─────────────────────────────────────────── -->
  <div class="col-span-7 flex flex-col gap-5">

    <!-- 알림 배너 -->
    <div id="alertBanner" class="hidden rounded-lg px-4 py-3 text-sm font-medium flex items-center gap-2"></div>

    <!-- ① 기본 정보 카드 -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      <h2 class="font-semibold text-slate-700 mb-4 text-sm uppercase tracking-wide">① 기본 정보</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">화면 ID <span class="text-red-500">*</span></label>
          <input id="screenId" type="text" placeholder="예: MNET010" maxlength="20"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 uppercase"
            oninput="this.value=this.value.toUpperCase()" />
          <p class="text-xs text-slate-400 mt-1">영문·숫자·언더스코어만 허용</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">화면 이름 <span class="text-red-500">*</span></label>
          <input id="screenName" type="text" placeholder="예: 신고 관리"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div class="col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1">페이지 타입 <span class="text-red-500">*</span></label>
          <div class="flex gap-2 flex-wrap" id="pageTypeGroup">
            <button data-type="list-detail" onclick="selectPageType(this)"
              class="px-4 py-2 rounded-lg border text-sm font-medium border-indigo-500 bg-indigo-50 text-indigo-700 ring-2 ring-indigo-300">
              🗂 리스트 + 상세
            </button>
            <button data-type="list" onclick="selectPageType(this)"
              class="px-4 py-2 rounded-lg border text-sm font-medium border-slate-300 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50">
              📋 리스트 단독
            </button>
            <button data-type="edit" onclick="selectPageType(this)"
              class="px-4 py-2 rounded-lg border text-sm font-medium border-slate-300 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50">
              ✏️ 입력 / 수정
            </button>
            <button data-type="tab-detail" onclick="selectPageType(this)"
              class="px-4 py-2 rounded-lg border text-sm font-medium border-slate-300 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50">
              🗃 탭형 상세
            </button>
          </div>
        </div>
        <div class="col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1">메뉴 경로 (선택)</label>
          <input id="menuPath" type="text" placeholder="예: 윤리경영 > 부정제보 > 신고 관리"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
      </div>
    </div>

    <!-- ② 필드 정의 카드 -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-slate-700 text-sm uppercase tracking-wide">② 필드 정의</h2>
        <button onclick="addField()"
          class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 flex items-center gap-1">
          <span>+ 필드 추가</span>
        </button>
      </div>

      <!-- 컬럼 헤더 -->
      <div class="grid grid-cols-12 gap-2 text-xs font-medium text-slate-400 uppercase mb-2 px-1">
        <div class="col-span-2">키</div>
        <div class="col-span-2">레이블</div>
        <div class="col-span-2">타입</div>
        <div class="col-span-1 text-center">검색</div>
        <div class="col-span-1 text-center">목록</div>
        <div class="col-span-1 text-center">상세</div>
        <div class="col-span-1 text-center">편집</div>
        <div class="col-span-1 text-center">필수</div>
        <div class="col-span-1 text-center">–</div>
      </div>

      <div id="fieldList" class="flex flex-col gap-2"></div>

      <!-- 빈 상태 -->
      <div id="emptyFields" class="text-center py-8 text-slate-400 text-sm">
        "+ 필드 추가" 버튼을 눌러 필드를 정의하세요.
      </div>
    </div>

    <!-- ③ tab-detail 탭 정의 (조건부 표시) -->
    <div id="tabSection" class="hidden bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-slate-700 text-sm uppercase tracking-wide">③ 탭 정의</h2>
        <button onclick="addTab()"
          class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700">
          + 탭 추가
        </button>
      </div>
      <div id="tabList" class="flex flex-col gap-2"></div>
      <div id="emptyTabs" class="text-center py-6 text-slate-400 text-sm">탭을 추가하세요.</div>
    </div>

    <!-- 생성 버튼 -->
    <button id="generateBtn" onclick="generate()"
      class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-indigo-700 active:scale-[0.99] transition-all flex items-center justify-center gap-2 shadow">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      MockUp 페이지 생성
    </button>
  </div>

  <!-- ── Right Panel: Preview + Generated List ─────────────────────── -->
  <div class="col-span-5 flex flex-col gap-5">

    <!-- 생성된 페이지 목록 -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-slate-700 text-sm uppercase tracking-wide">생성된 페이지</h2>
        <button onclick="loadPages()" class="text-xs text-slate-400 hover:text-slate-600">새로고침</button>
      </div>
      <div id="pageList" class="flex flex-col gap-2 max-h-56 overflow-y-auto">
        <p class="text-xs text-slate-400 text-center py-4">불러오는 중…</p>
      </div>
    </div>

    <!-- 코드 미리보기 -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col overflow-hidden" style="max-height: 620px">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
        <h2 class="font-semibold text-slate-700 text-sm uppercase tracking-wide">코드 미리보기</h2>
        <button id="copyBtn" onclick="copyCode()"
          class="text-xs text-slate-400 hover:text-slate-600 hidden">📋 복사</button>
      </div>
      <pre id="codePreview"
        class="flex-1 overflow-auto text-xs text-slate-600 p-4 bg-slate-50 leading-relaxed">
<span class="text-slate-400">// 페이지를 생성하면 여기에 코드가 표시됩니다.</span>
      </pre>
    </div>
  </div>

</div><!-- /grid -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────────────
let state = {
  pageType: 'list-detail',
  fields: [],
  tabs: [],
  fieldIdSeq: 0,
  tabIdSeq: 0,
};

const FIELD_TYPES = [
  { value: 'text',      label: '텍스트' },
  { value: 'number',    label: '숫자' },
  { value: 'select',    label: '선택(Select)' },
  { value: 'badge',     label: '상태뱃지(Badge)' },
  { value: 'date',      label: '날짜' },
  { value: 'daterange', label: '날짜 범위' },
  { value: 'textarea',  label: '장문(Textarea)' },
  { value: 'radio',     label: '라디오' },
  { value: 'checkbox',  label: '체크박스' },
];

// ─────────────────────────────────────────────────────────────────────────────
//  Page Type
// ─────────────────────────────────────────────────────────────────────────────
function selectPageType(btn) {
  document.querySelectorAll('#pageTypeGroup button').forEach(b => {
    b.className = 'px-4 py-2 rounded-lg border text-sm font-medium border-slate-300 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50';
  });
  btn.className = 'px-4 py-2 rounded-lg border text-sm font-medium border-indigo-500 bg-indigo-50 text-indigo-700 ring-2 ring-indigo-300';
  state.pageType = btn.dataset.type;
  document.getElementById('tabSection').className = state.pageType === 'tab-detail'
    ? 'bg-white rounded-xl border border-slate-200 shadow-sm p-6'
    : 'hidden bg-white rounded-xl border border-slate-200 shadow-sm p-6';
}

// ─────────────────────────────────────────────────────────────────────────────
//  Field Management
// ─────────────────────────────────────────────────────────────────────────────
function addField() {
  const id = ++state.fieldIdSeq;
  state.fields.push({
    id,
    key: '',
    label: '',
    type: 'text',
    searchable: true,
    listable: true,
    detailable: true,
    editable: false,
    required: false,
    options: [],
    optionMode: 'direct',
    codeClass: '',
  });
  renderFields();
}

function removeField(id) {
  state.fields = state.fields.filter(f => f.id !== id);
  renderFields();
}

function updateField(id, prop, value) {
  const f = state.fields.find(f => f.id === id);
  if (f) f[prop] = value;
}

function renderFields() {
  const list  = document.getElementById('fieldList');
  const empty = document.getElementById('emptyFields');
  empty.style.display = state.fields.length ? 'none' : 'block';
  list.innerHTML = state.fields.map(f => `
    <div class="field-card grid grid-cols-12 gap-2 items-center bg-slate-50 rounded-lg px-2 py-2 relative">
      <div class="col-span-2">
        <input type="text" value="${f.key}" placeholder="key" maxlength="30"
          oninput="updateField(${f.id},'key',this.value)"
          class="w-full text-xs border border-slate-200 rounded px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400 bg-white" />
      </div>
      <div class="col-span-2">
        <input type="text" value="${f.label}" placeholder="레이블" maxlength="20"
          oninput="updateField(${f.id},'label',this.value)"
          class="w-full text-xs border border-slate-200 rounded px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400 bg-white" />
      </div>
      <div class="col-span-2">
        <select onchange="updateField(${f.id},'type',this.value)"
          class="w-full text-xs border border-slate-200 rounded px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400 bg-white">
          ${FIELD_TYPES.map(t => `<option value="${t.value}" ${f.type===t.value?'selected':''}>${t.label}</option>`).join('')}
        </select>
      </div>
      <div class="col-span-1 flex justify-center">
        <input type="checkbox" ${f.searchable?'checked':''} onchange="updateField(${f.id},'searchable',this.checked)"
          class="w-4 h-4 accent-indigo-600 cursor-pointer" />
      </div>
      <div class="col-span-1 flex justify-center">
        <input type="checkbox" ${f.listable?'checked':''} onchange="updateField(${f.id},'listable',this.checked)"
          class="w-4 h-4 accent-indigo-600 cursor-pointer" />
      </div>
      <div class="col-span-1 flex justify-center">
        <input type="checkbox" ${f.detailable?'checked':''} onchange="updateField(${f.id},'detailable',this.checked)"
          class="w-4 h-4 accent-indigo-600 cursor-pointer" />
      </div>
      <div class="col-span-1 flex justify-center">
        <input type="checkbox" ${f.editable?'checked':''} onchange="updateField(${f.id},'editable',this.checked)"
          class="w-4 h-4 accent-indigo-600 cursor-pointer" />
      </div>
      <div class="col-span-1 flex justify-center">
        <input type="checkbox" ${f.required?'checked':''} onchange="updateField(${f.id},'required',this.checked)"
          class="w-4 h-4 accent-indigo-600 cursor-pointer" />
      </div>
      <div class="col-span-1 flex justify-center">
        <button onclick="removeField(${f.id})" class="field-delete text-slate-400 hover:text-red-500 text-lg leading-none">×</button>
      </div>
      ${(f.type==='select'||f.type==='radio'||f.type==='badge') ? `
      <div class="col-span-12 mt-1.5 flex flex-col gap-1.5">
        <div class="flex items-center gap-3">
          <span class="text-xs text-slate-400 font-medium whitespace-nowrap">옵션 방식:</span>
          <label class="flex items-center gap-1 text-xs text-slate-600 cursor-pointer">
            <input type="radio" name="optMode_${f.id}" value="direct"
              ${(f.optionMode||'direct')==='direct'?'checked':''}
              onchange="updateOptionMode(${f.id},'direct')"
              class="accent-indigo-600" />
            직접 입력
          </label>
          <label class="flex items-center gap-1 text-xs text-slate-600 cursor-pointer">
            <input type="radio" name="optMode_${f.id}" value="codeClass"
              ${f.optionMode==='codeClass'?'checked':''}
              onchange="updateOptionMode(${f.id},'codeClass')"
              class="accent-indigo-600" />
            공통코드 그룹 참조
          </label>
        </div>
        ${(f.optionMode||'direct')==='direct' ? `
        <input type="text" placeholder='옵션: 레이블:값:색상, ... 예) 접수:RECV:blue,처리중:WIP:orange'
          value="${(f.options||[]).map(o=>o.label+':'+o.value+(o.color?':'+o.color:'')).join(',')}"
          oninput="parseOptions(${f.id},this.value)"
          class="w-full text-xs border border-slate-200 rounded px-2 py-1.5 bg-white focus:outline-none focus:ring-1 focus:ring-indigo-400 text-slate-500" />
        ` : `
        <input type="text" placeholder='공통코드 그룹(code_class) 예) YN_TYPE, COURSE_STATUS'
          value="${f.codeClass||''}"
          oninput="updateCodeClass(${f.id},this.value)"
          class="w-full text-xs border border-indigo-200 rounded px-2 py-1.5 bg-indigo-50 focus:outline-none focus:ring-1 focus:ring-indigo-400 text-indigo-700 font-mono placeholder-indigo-300" />
        `}
      </div>` : ''}
    </div>
  `).join('');
}

function parseOptions(id, raw) {
  const f = state.fields.find(f => f.id === id);
  if (!f) return;
  f.options = raw.split(',').map(s => {
    const [label, value, color] = s.trim().split(':');
    return { label: label||'', value: value||'', color: color||undefined };
  }).filter(o => o.label && o.value);
}

function updateOptionMode(id, mode) {
  const f = state.fields.find(f => f.id === id);
  if (!f) return;
  f.optionMode = mode;
  renderFields();
}

function updateCodeClass(id, value) {
  const f = state.fields.find(f => f.id === id);
  if (!f) return;
  f.codeClass = value;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Tab Management
// ─────────────────────────────────────────────────────────────────────────────
function addTab() {
  const id = ++state.tabIdSeq;
  state.tabs.push({ id, key: `tab${id}`, label: `탭 ${id}`, fieldKeys: [] });
  renderTabs();
}

function removeTab(id) {
  state.tabs = state.tabs.filter(t => t.id !== id);
  renderTabs();
}

function renderTabs() {
  const list  = document.getElementById('tabList');
  const empty = document.getElementById('emptyTabs');
  empty.style.display = state.tabs.length ? 'none' : 'block';
  list.innerHTML = state.tabs.map(t => `
    <div class="flex gap-2 items-center bg-slate-50 rounded-lg p-2">
      <input type="text" value="${t.key}" placeholder="key" maxlength="20"
        oninput="updateTab(${t.id},'key',this.value)"
        class="w-24 text-xs border border-slate-200 rounded px-2 py-1.5 focus:outline-none bg-white" />
      <input type="text" value="${t.label}" placeholder="탭 레이블" maxlength="20"
        oninput="updateTab(${t.id},'label',this.value)"
        class="flex-1 text-xs border border-slate-200 rounded px-2 py-1.5 focus:outline-none bg-white" />
      <button onclick="removeTab(${t.id})" class="text-slate-400 hover:text-red-500 text-lg leading-none">×</button>
    </div>
  `).join('');
}

function updateTab(id, prop, value) {
  const t = state.tabs.find(t => t.id === id);
  if (t) t[prop] = value;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Generate
// ─────────────────────────────────────────────────────────────────────────────
async function generate() {
  const screenId   = document.getElementById('screenId').value.trim().toUpperCase();
  const screenName = document.getElementById('screenName').value.trim();
  const menuPathRaw = document.getElementById('menuPath').value.trim();

  if (!screenId || !screenName) {
    showAlert('❌ 화면 ID와 화면 이름은 필수입니다.', 'error');
    return;
  }
  if (!/^[A-Za-z0-9_]+$/.test(screenId)) {
    showAlert('❌ 화면 ID는 영문·숫자·언더스코어만 허용됩니다.', 'error');
    return;
  }

  // 필드 정제 (빈 key/label 제거)
  const cleanFields = state.fields
    .filter(f => f.key && f.label)
    .map(({ id, ...f }) => f);

  if (cleanFields.length === 0) {
    showAlert('❌ 필드를 하나 이상 정의해야 합니다.', 'error');
    return;
  }

  const payload = {
    screenId,
    screenName,
    pageType: state.pageType,
    menuPath: menuPathRaw ? menuPathRaw.split('>').map(s => s.trim()) : undefined,
    fields: cleanFields,
    tabs: state.pageType === 'tab-detail'
      ? state.tabs.filter(t => t.key && t.label).map(({ id, fieldKeys, ...t }) => ({
          ...t,
          fields: cleanFields.filter(f => f.detailable),
        }))
      : undefined,
  };

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = `<svg class="spinner w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2" opacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-width="2"/></svg> 생성 중…`;

  try {
    const res  = await fetch('/api/scaffold', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (data.success) {
      showAlert(`${data.message}\n👉 <a href="http://localhost:5173${data.routePath}" target="_blank" class="underline">Vite 서버에서 보기 →</a>`, 'success');
      if (data.preview) showCodePreview(data.preview);
      loadPages();
    } else {
      showAlert(`❌ ${data.message}`, 'error');
    }
  } catch (e) {
    showAlert('❌ 서버 연결 오류: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> MockUp 페이지 생성`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  Page List
// ─────────────────────────────────────────────────────────────────────────────
async function loadPages() {
  const list = document.getElementById('pageList');
  try {
    const res  = await fetch('/api/scaffold');
    const data = await res.json();
    if (!data.pages?.length) {
      list.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">생성된 페이지가 없습니다.</p>';
      return;
    }
    list.innerHTML = data.pages.map(p => `
      <div class="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2 text-xs">
        <span class="font-mono font-semibold text-indigo-700 min-w-[80px]">${p.screenId}</span>
        <span class="flex-1 text-slate-600 truncate">${p.screenName}</span>
        <span class="text-slate-400 text-[10px]">${p.pageType}</span>
        <button onclick="previewPage('${p.screenId}')"
          class="text-slate-400 hover:text-indigo-600" title="코드 보기">📄</button>
        <a href="http://localhost:5173${p.routePath}" target="_blank"
          class="text-slate-400 hover:text-indigo-600" title="브라우저에서 보기">🔗</a>
        <button onclick="deletePage('${p.screenId}')"
          class="text-slate-400 hover:text-red-500" title="삭제">🗑</button>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<p class="text-xs text-red-400 text-center py-4">목록 조회 실패</p>';
  }
}

async function previewPage(screenId) {
  const res  = await fetch(`/api/scaffold/${screenId}/preview`);
  const data = await res.json();
  if (data.code) showCodePreview(data.code);
}

async function deletePage(screenId) {
  if (!confirm(`${screenId} 페이지를 삭제하시겠습니까?`)) return;
  const res  = await fetch(`/api/scaffold/${screenId}`, { method: 'DELETE' });
  const data = await res.json();
  showAlert(data.success ? `✅ ${data.message}` : `❌ ${data.message}`, data.success ? 'success' : 'error');
  loadPages();
}

// ─────────────────────────────────────────────────────────────────────────────
//  UI Helpers
// ─────────────────────────────────────────────────────────────────────────────
function showCodePreview(code) {
  const pre  = document.getElementById('codePreview');
  const copy = document.getElementById('copyBtn');
  pre.textContent = code;
  copy.classList.remove('hidden');
  pre._code = code;
}

function copyCode() {
  const pre = document.getElementById('codePreview');
  navigator.clipboard.writeText(pre._code || pre.textContent)
    .then(() => showAlert('✅ 코드가 클립보드에 복사되었습니다.', 'success'));
}

function showAlert(html, type) {
  const el   = document.getElementById('alertBanner');
  const base = 'rounded-lg px-4 py-3 text-sm font-medium flex items-center gap-2';
  el.className = type === 'success'
    ? base + ' bg-green-50 text-green-800 border border-green-200'
    : base + ' bg-red-50 text-red-800 border border-red-200';
  el.innerHTML = html;
  el.style.display = 'flex';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, 6000);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────────────────────────────
async function checkHealth() {
  const el = document.getElementById('healthStatus');
  try {
    const res  = await fetch('/api/health');
    const data = await res.json();
    el.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-400"></span> 서버 연결됨`;
    el.className = 'ml-auto flex items-center gap-2 text-xs text-green-600';
  } catch {
    el.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400"></span> 서버 오프라인`;
    el.className = 'ml-auto flex items-center gap-2 text-xs text-red-500';
  }
}

// 샘플 필드 로드
function loadSampleFields() {
  state.fields = [
    { id: ++state.fieldIdSeq, key: 'title',      label: '제목',      type: 'text',   searchable: true,  listable: true,  detailable: true,  editable: true,  required: true,  options: [] },
    { id: ++state.fieldIdSeq, key: 'status',     label: '처리상태',  type: 'badge',  searchable: true,  listable: true,  detailable: true,  editable: false, required: false, options: [
      { label: '접수', value: 'RECV', color: 'blue' },
      { label: '처리중', value: 'WIP', color: 'orange' },
      { label: '완료', value: 'DONE', color: 'green' },
    ]},
    { id: ++state.fieldIdSeq, key: 'regDt',      label: '등록일',    type: 'daterange', searchable: true,  listable: true,  detailable: true,  editable: false, required: false, options: [] },
    { id: ++state.fieldIdSeq, key: 'content',    label: '내용',      type: 'textarea',  searchable: false, listable: false, detailable: true,  editable: true,  required: false, options: [] },
  ];
  renderFields();
}

document.addEventListener('DOMContentLoaded', () => {
  checkHealth();
  loadPages();
  loadSampleFields();
  renderFields();

  // 샘플 ID/이름 힌트
  document.getElementById('screenId').placeholder   = 'MNET010';
  document.getElementById('screenName').placeholder = '신고 관리';
});
</script>
